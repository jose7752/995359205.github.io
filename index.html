<html lang="zh-CN"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配送单生成工具</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#e5e7eb',
                        accent: '#6b7280',
                        light: '#f9fafb',
                        dark: '#1f2937',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
        <script>
            // 切换设备管理模态框
            function toggleDevicesModal() {
                const modal = document.getElementById('devicesModal');
                modal.classList.toggle('hidden');
            }

            // 测试同步
            function testSync() {
                if (syncManager) {
                    syncManager.testSync();
                } else {
                    alert('同步管理器未初始化');
                }
            }

            // 页面卸载时清理资源
            window.addEventListener('beforeunload', function() {
                if (syncManager) {
                    syncManager.cleanup();
                }
            });
        </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .invoice-border {
                border: 1px solid #000;
            }
            .invoice-border-t {
                border-top: 1px solid #000;
            }
            .invoice-border-b {
                border-bottom: 1px solid #000;
            }
            .invoice-border-l {
                border-left: 1px solid #000;
            }
            .invoice-border-r {
                border-right: 1px solid #000;
            }
            .form-input {
                @apply w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent;
            }
            .form-label {
                @apply block text-sm font-medium text-gray-700 mb-1;
            }
            .btn {
                @apply px-4 py-2 rounded-md font-medium focus:outline-none focus:ring-2 focus:ring-offset-2 transition-colors;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-blue-700 focus:ring-blue-500;
            }
            .btn-secondary {
                @apply bg-secondary text-dark hover:bg-gray-300 focus:ring-gray-400;
            }
            .btn-danger {
                @apply bg-red-500 text-white hover:bg-red-600 focus:ring-red-500;
            }
            .no-spin-buttons::-webkit-outer-spin-button,
            .no-spin-buttons::-webkit-inner-spin-button {
                -webkit-appearance: none;
                margin: 0;
            }
            .no-spin-buttons {
                -moz-appearance: textfield;
            }
            .sync-indicator {
                @apply fixed top-4 right-4 z-50 flex items-center gap-2 px-3 py-1.5 rounded-full text-sm font-medium transition-all duration-300;
            }
            .sync-indicator.connected {
                @apply bg-success text-white;
            }
            .sync-indicator.disconnected {
                @apply bg-warning text-white;
            }
            .sync-indicator.syncing {
                @apply bg-primary text-white animate-pulse;
            }
            .device-item {
                @apply flex items-center justify-between px-3 py-2 hover:bg-gray-100 rounded;
            }
            .device-item.active {
                @apply bg-blue-50 border-l-4 border-primary;
            }
        }

        /* 打印样式 - 自定义规格 */
        @media print {
            * {
                box-sizing: border-box;
            }
            /* 隐藏所有非打印内容 */
            body > *:not(#printModal) {
                display: none !important;
            }
            .no-print {
                display: none !important;
            }
            /* 确保打印模态框显示 */
            #printModal {
                display: block !important;
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                width: 100% !important;
                height: 100% !important;
                background: white !important;
                z-index: 9999 !important;
            }
            #printModal > div {
                all: unset !important;
                width: 241mm !important;
                height: 140mm !important;
                margin: 0 auto !important;
                padding: 0 !important;
            }
            .invoice-preview {
                box-shadow: none !important;
                margin: 0 !important;
                padding: 10mm !important;
                width: 241mm !important;
                height: 140mm !important;
                page-break-inside: avoid !important;
                overflow: hidden !important;
                background: white !important;
            }
            body {
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                font-size: 10pt !important;
                line-height: 1.2 !important;
            }
            /* 强制页面规格 */
            @page {
                size: 241mm 140mm !important;
                margin: 0 !important;
            }
            /* 调整表格字体大小和行高 */
            table {
                font-size: 9pt !important;
                width: 100% !important;
            }
            /* 设置配送单行高为25 */
            .invoice-preview table tr {
                height: 25px !important;
            }
            /* 防止内容溢出 */
            div, table, tr, td, th {
                page-break-inside: avoid !important;
                page-break-after: avoid !important;
                page-break-before: avoid !important;
            }
            /* 确保表格内容不换行 */
            th, td {
                white-space: nowrap !important;
                overflow: hidden !important;
                text-overflow: ellipsis !important;
            }
            /* 隐藏滚动条 */
            ::-webkit-scrollbar {
                display: none !important;
            }
            /* 确保所有元素都在一页内 */
            html, body {
                height: 100% !important;
                overflow: hidden !important;
            }
        }
    </style>
</head>
<body class="bg-light min-h-screen">
    <div class="w-full py-4">
        <!-- 同步状态指示器 -->
        <div id="syncIndicator" class="sync-indicator disconnected no-print">
            <i class="fa fa-wifi"></i>
            <span id="syncStatus">未连接</span>
            <span id="connectedDevices" class="hidden">0</span>
            <button id="toggleDevicesBtn" class="ml-2 text-white hover:text-gray-200">
                <i class="fa fa-cog"></i>
            </button>
        </div>

        <!-- 设备管理弹窗 -->
        <div id="devicesModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden no-print">
            <div class="bg-white rounded-lg p-6 max-w-md w-full">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold">设备管理</h3>
                    <button id="closeDevicesBtn" class="text-gray-500 hover:text-gray-700">
                        <i class="fa fa-times text-xl"></i>
                    </button>
                </div>
                <div class="mb-4">
                    <p class="text-sm text-gray-600 mb-2">设备ID: <span id="currentDeviceId" class="font-mono"></span></p>
                    <p class="text-sm text-gray-600">已连接设备 (<span id="devicesCount">0</span>):</p>
                    <div id="devicesList" class="mt-2 max-h-60 overflow-y-auto border border-gray-200 rounded">
                        <!-- 设备列表将在这里动态生成 -->
                    </div>
                </div>
                <div class="flex justify-end gap-2">
                    <button id="testSyncBtn" class="btn btn-primary">测试同步</button>
                    <button id="closeDevicesBtn2" class="btn btn-secondary">关闭</button>
                </div>
            </div>
        </div>

        <!-- 头部 -->
        <header class="mb-8 no-print">
            <h1 class="text-3xl font-bold text-center text-dark">宁德市丛林农业发展有限公司配送单</h1>
            <p class="text-center text-accent mt-2">填写左侧表单，右侧实时预览配送单</p>
        </header>

        <!-- 主要内容 -->
        <div class="flex flex-col lg:flex-row gap-0">
            <!-- 表单区域 -->
            <div class="w-full lg:w-1/2 bg-white p-6 rounded-lg shadow-md no-print">
                <h2 class="text-xl font-semibold mb-4 text-dark border-b pb-2">配送单信息</h2>
                
                <form id="invoiceForm">
                    <!-- 用户名称 -->
                    <div class="grid grid-cols-1 gap-4 mb-6">
                        <div>
                            <label for="companyName" class="form-label">用户名称</label>
                            <div class="relative">
                                <input type="text" id="companyName" name="companyName" class="form-input pr-10" placeholder="请输入用户名称或从下拉列表中选择" value="宁德市东侨经济技术开发区何起园蔬菜店">
                                <button type="button" id="toggleUsersBtn" class="absolute right-2 top-1/2 transform -translate-y-1/2 text-primary hover:text-blue-700">
                                    <i class="fa fa-chevron-down"></i>
                                </button>
                                <div id="usersDropdown" class="absolute left-0 right-0 mt-1 bg-white border border-gray-300 rounded-md shadow-lg z-10 max-h-60 overflow-y-auto hidden">
                                    <!-- 已保存的用户列表将在这里动态添加 -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 配送日期 -->
                    <div class="grid grid-cols-1 gap-4 mb-6">
                        <div>
                            <label for="invoiceDate" class="form-label">配送日期</label>
                            <input type="date" id="invoiceDate" name="invoiceDate" class="form-input" value="">
                        </div>
                    </div>

                    <!-- 商品列表 -->
                    <div class="mb-6">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="text-lg font-medium text-dark">商品列表</h3>
                            <button type="button" id="addItemBtn" class="btn btn-primary text-sm">
                                <i class="fa fa-plus mr-1"></i> 添加商品
                            </button>
                        </div>
                        
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" style="width: 200px; min-width: 200px;">品名</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">单位</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap" style="width: 80px; min-width: 80px;">数量</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">不含税单价</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">不含税金额</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">税率或征收率</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">税额</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">价税合计</th>
                                        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="itemsTable" class="bg-white divide-y divide-gray-200">
                                    <!-- 商品行将通过JavaScript动态添加 -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 总计 -->
                    <div class="flex justify-end mb-6">
                        <div class="flex items-center">
                            <span class="text-lg font-medium mr-2">总计:</span>
                            <span id="totalAmount" class="text-xl font-bold text-primary">¥0.00</span>
                        </div>
                    </div>

                    <!-- 送货人和收货人 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div>
                            <label for="shipper" class="form-label">送货人</label>
                            <input type="text" id="shipper" name="shipper" class="form-input" placeholder="无需填写" value="" readonly="">
                        </div>
                        <div>
                            <label for="receiver" class="form-label">收货人</label>
                            <input type="text" id="receiver" name="receiver" class="form-input" placeholder="无需填写" value="" readonly="">
                        </div>
                    </div>

                    <!-- 操作按钮 -->
                    <div class="flex justify-end gap-4">
                        <button type="button" id="resetBtn" class="btn btn-secondary">
                            <i class="fa fa-refresh mr-1"></i> 重置
                        </button>
                        <button type="button" id="saveInvoiceBtn" class="btn bg-green-500 hover:bg-green-600 text-white">
                            <i class="fa fa-save mr-1"></i> 保存配送单
                        </button>
                    </div>
                    
                    <!-- 订单链接和分拣按钮 -->
                    <div class="mt-4 flex justify-between items-center">
                        <div>
                            <a href="#" id="sortingLink" class="text-purple-500 hover:underline">
                                <i class="fa fa-sort-amount-desc mr-1"></i> 分拣系统
                            </a>
                        </div>
                        <div class="flex items-center gap-4">
                            <button type="button" id="manageProductsBtn" class="text-green-500 hover:underline">
                                <i class="fa fa-cog mr-1"></i> 管理商品
                            </button>
                            <a href="#" id="ordersLink" class="text-blue-500 hover:underline">查看已保存的配送单</a>
                        </div>
                    </div>
                </form>
            </div>

            <!-- 预览区域 -->
            <div class="w-full lg:w-1/2">
                <div class="invoice-preview bg-white p-6 rounded-lg shadow-md border border-gray-200" style="width: 241mm; height: 140mm; margin: 0 auto;">
                    <!-- 配送单标题 -->
                    <div class="text-center mb-4">
                        <h2 class="text-2xl font-bold">宁德市丛林农业发展有限公司</h2>
                    </div>

                    <!-- 单位信息和日期 -->
                    <div class="flex justify-between items-center mb-4 text-sm">
                        <div>
                            <p><strong>用户名称:</strong> <span id="previewCompanyName">宁德市东侨经济技术开发区何起园蔬菜店</span></p>
                        </div>
                        <div>
                            <p class="whitespace-nowrap"><strong>配送日期:</strong> <span id="previewDate"></span></p>
                        </div>
                    </div>

                    <!-- 商品表格 -->
                    <div class="overflow-x-auto mb-4">
                        <table class="min-w-full invoice-border text-xs">
                            <thead>
                                <tr class="bg-gray-100">
                                    <th class="px-2 py-1 invoice-border text-left" style="width: 80px; min-width: 80px; font-size: 14px; text-align: center;">品名</th>
                                    <th class="px-2 py-1 invoice-border text-center whitespace-nowrap" style="font-size: 14px;">单位</th>
                                    <th class="px-2 py-1 invoice-border text-center whitespace-nowrap" style="font-size: 14px;">数量</th>
                                    <th class="px-2 py-1 invoice-border text-center whitespace-nowrap" style="font-size: 14px;">不含税单价</th>
                                    <th class="px-2 py-1 invoice-border text-center whitespace-nowrap" style="font-size: 14px;">不含税金额</th>
                                    <th class="px-2 py-1 invoice-border text-center whitespace-nowrap" style="font-size: 14px;">税率或征收率</th>
                                    <th class="px-2 py-1 invoice-border text-center whitespace-nowrap" style="font-size: 14px;">税额</th>
                                    <th class="px-2 py-1 invoice-border text-right whitespace-nowrap" style="font-size: 14px; text-align: center;">价税合计</th>
                                </tr>
                            </thead>
                            <tbody id="previewItemsTable">
                                <!-- 商品行将通过JavaScript动态添加 -->
                            </tbody>
                        </table>
                    </div>

                    <!-- 总计 -->
                    <div class="flex justify-end mb-4">
                        <p class="text-sm"><strong>总计:</strong><span id="previewTotalAmount">0.00</span></p>
                    </div>

                    <!-- 送货人和收货人 -->
                    <div class="grid grid-cols-2 gap-4 text-xs">
                        <div>
                            <p><strong style="font-size: 14px;">送货人:</strong> <span id="previewShipper"></span></p>
                        </div>
                        <div>
                            <p><strong style="font-size: 14px;">收货人:</strong> <span id="previewReceiver"></span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部 -->
        <footer class="mt-12 text-center text-accent text-sm no-print">
            <p>© 2026 配送单生成工具 | 设计与开发</p>
        </footer>
    </div>

    <script>
        // 预设商品列表（从本地存储加载或使用默认值）
        let presetProducts = JSON.parse(localStorage.getItem('presetProducts')) || [
            '大白菜', '芹菜', '上海青', '杭椒', '青尖椒', '青瓜', '茄子', '西红柿', 
            '莲藕', '包菜', '花菜', '莴笋', '蒜苔', '冬瓜', '苦瓜', '胡萝卜', 
            '白萝卜', '土豆', '香菇', '菜葱', '洋葱', '长豆角', '清水笋丝', '清水笋片'
        ];
        
        // 保存预设商品到本地存储
        function savePresetProducts() {
            localStorage.setItem('presetProducts', JSON.stringify(presetProducts));
            
            // 同步到其他设备
            if (syncManager) {
                syncManager.sendDataUpdate('products', presetProducts);
            }
        }

        // 初始化日期为今天
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date();
            const formattedDate = today.toISOString().substr(0, 10);
            document.getElementById('invoiceDate').value = formattedDate;
            document.getElementById('previewDate').textContent = formatDate(today);
            
            // 初始化商品列表
            addNewItem();
            
            // 更新预览
            updatePreview();
            
            // 商品管理按钮事件
            document.getElementById('manageProductsBtn').addEventListener('click', showProductManagement);
            
            // 初始化同步功能
            initSync();
            
            // 设备管理按钮事件
            document.getElementById('toggleDevicesBtn').addEventListener('click', toggleDevicesModal);
            document.getElementById('closeDevicesBtn').addEventListener('click', toggleDevicesModal);
            document.getElementById('closeDevicesBtn2').addEventListener('click', toggleDevicesModal);
            document.getElementById('testSyncBtn').addEventListener('click', testSync);
        });

        // 添加新商品行
        document.getElementById('addItemBtn').addEventListener('click', function() {
            addNewItem();
        });

        // 重置表单
        document.getElementById('resetBtn').addEventListener('click', function() {
            if (confirm('确定要重置表单吗？这将清空所有输入内容。')) {
                // 保留单位信息和日期
                const companyName = document.getElementById('companyName').value;

                const invoiceDate = document.getElementById('invoiceDate').value;
                
                // 重置表单
                document.getElementById('invoiceForm').reset();
                
                // 恢复单位信息和日期
                document.getElementById('companyName').value = companyName;

                document.getElementById('invoiceDate').value = invoiceDate;


                
                // 清空商品列表并添加一行空商品
                const itemsTable = document.getElementById('itemsTable');
                itemsTable.innerHTML = '';
                addNewItem();
                
                // 更新预览
                updatePreview();
            }
        });

        // 打印功能已移至已保存配送单列表中
        
        // 保存配送单
        document.getElementById('saveInvoiceBtn').addEventListener('click', saveInvoice);
        
        // 查看已保存的配送单
        document.getElementById('ordersLink').addEventListener('click', function(e) {
            e.preventDefault();
            showSavedInvoices();
        });
        
        // 分拣系统链接
        document.getElementById('sortingLink').addEventListener('click', function(e) {
            e.preventDefault();
            showSortingSystem();
        });

        // 监听表单变化，更新预览
        document.getElementById('companyName').addEventListener('input', updatePreview);
        document.getElementById('invoiceDate').addEventListener('change', updatePreview);
        
        // 切换用户下拉列表
        document.getElementById('toggleUsersBtn').addEventListener('click', toggleUsersBtn);
        
        // 点击页面其他地方关闭下拉列表
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('usersDropdown');
            const toggleBtn = document.getElementById('toggleUsersBtn');
            const input = document.getElementById('companyName');
            
            if (!dropdown.contains(e.target) && !toggleBtn.contains(e.target) && !input.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
            
            // 关闭所有商品下拉列表
            document.querySelectorAll('.products-dropdown').forEach(dropdown => {
                const toggleBtn = dropdown.previousElementSibling;
                const nameInput = dropdown.closest('div').querySelector('.item-name');
                
                if (!dropdown.contains(e.target) && !toggleBtn.contains(e.target) && !nameInput.contains(e.target)) {
                    dropdown.classList.add('hidden');
                }
            });
        });
        
        // 输入时自动保存用户
        document.getElementById('companyName').addEventListener('blur', function() {
            const userName = this.value.trim();
            if (userName) {
                saveUserName(userName);
            }
        });
        
        // 加载已保存的用户
        loadSavedUsers();
        document.getElementById('shipper').addEventListener('input', updatePreview);
        document.getElementById('receiver').addEventListener('input', updatePreview);

        // 添加新商品行
        function addNewItem(name = '', unit = '公斤', quantity = '', taxFreePrice = '') {
            const itemsTable = document.getElementById('itemsTable');
            const rowIndex = itemsTable.children.length;
            
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="px-3 py-2 whitespace-nowrap">
                    <div class="relative">
                        <input type="text" class="item-name form-input py-1 text-sm pr-8" placeholder="输入商品名称搜索" value="${name}" list="productsList-${rowIndex}">
                        <datalist id="productsList-${rowIndex}">
                            ${presetProducts.map(product => `<option value="${product}"></option>`).join('')}
                        </datalist>
                        <button type="button" class="toggle-products-btn absolute right-2 top-1/2 transform -translate-y-1/2 text-primary hover:text-blue-700 text-sm">
                            <i class="fa fa-chevron-down"></i>
                        </button>
                        <div class="products-dropdown absolute left-0 right-0 mt-1 bg-white border border-gray-300 rounded-md shadow-lg z-10 max-h-60 overflow-y-auto hidden">
                            ${presetProducts.map(product => `<div class="px-3 py-2 hover:bg-blue-50 cursor-pointer">${product}</div>`).join('')}
                        </div>
                    </div>
                </td>
                <td class="px-3 py-2 whitespace-nowrap">
                    <input type="text" class="item-unit form-input py-1 text-sm bg-gray-100" value="公斤" readonly>
                </td>
                <td class="px-3 py-2 whitespace-nowrap">
                    <input type="number" class="item-quantity form-input py-1 text-sm no-spin-buttons w-full" placeholder="数量" value="${quantity}" min="0" step="0.01" onwheel="this.blur()">
                </td>
                <td class="px-3 py-2 whitespace-nowrap">
                    <input type="number" class="item-tax-free-price form-input py-1 text-sm no-spin-buttons" placeholder="不含税单价" value="${taxFreePrice}" min="0" step="0.01" onwheel="this.blur()">

                    );

        // 更新商品金额
        function updateItemAmount() {
            const row = this.closest('tr');
            const quantity = parseFloat(row.querySelector('.item-quantity').value) || 0;
            const taxFreePrice = parseFloat(row.querySelector('.item-tax-free-price').value) || 0;
            const taxFreeAmount = Math.round(quantity * taxFreePrice * 100) / 100;
            const taxRate = 0.03; // 3%税率
            const taxAmount = Math.round(taxFreeAmount * taxRate * 100) / 100;
            const amount = Math.round((taxFreeAmount + taxAmount) * 100) / 100;
            
            row.querySelector('.item-tax-free-amount').textContent = `${taxFreeAmount.toFixed(2)}`;
            row.querySelector('.item-tax-amount').textContent = `${taxAmount.toFixed(2)}`;
            row.querySelector('.item-amount').textContent = `${amount.toFixed(2)}`;
            
            // 更新总计
            updateTotal();
            
            // 更新预览
            updatePreview();
        }

        // 更新总计
        function updateTotal() {
            const itemRows = document.querySelectorAll('#itemsTable tr');
            let total = 0;
            const taxRate = 0.03; // 3%税率
            
            itemRows.forEach(row => {
                const quantity = parseFloat(row.querySelector('.item-quantity').value) || 0;
                const taxFreePrice = parseFloat(row.querySelector('.item-tax-free-price').value) || 0;
                const taxFreeAmount = Math.round(quantity * taxFreePrice * 100) / 100;
                const taxAmount = Math.round(taxFreeAmount * taxRate * 100) / 100;
                total += Math.round((taxFreeAmount + taxAmount) * 100) / 100;
            });
            
            document.getElementById('totalAmount').textContent = `${total.toFixed(2)}`;
        }

        // 保存配送单
        function saveInvoice() {
            const userName = document.getElementById('companyName').value.trim();
            const date = document.getElementById('invoiceDate').value;
            
            if (!userName) {
                alert('请输入用户名称');
                return;
            }
            
            if (!date) {
                alert('请选择配送日期');
                return;
            }
            
            const items = [];
            const itemRows = document.querySelectorAll('#itemsTable tr');
            let hasItems = false;
            
            itemRows.forEach(row => {
                const name = row.querySelector('.item-name').value.trim();
                const quantity = parseFloat(row.querySelector('.item-quantity').value) || 0;
                const taxFreePrice = parseFloat(row.querySelector('.item-tax-free-price').value) || 0;
                
                if (name && quantity > 0 && taxFreePrice > 0) {
                    const taxFreeAmount = Math.round(quantity * taxFreePrice * 100) / 100;
                    const taxAmount = Math.round(taxFreeAmount * 0.03 * 100) / 100;
                    const amount = Math.round((taxFreeAmount + taxAmount) * 100) / 100;
                    
                    items.push({
                        name,
                        unit: '公斤',
                        quantity,
                        taxFreePrice,
                        taxFreeAmount,
                        taxAmount,
                        amount
                    });
                    
                    hasItems = true;
                }
            });
            
            if (!hasItems) {
                alert('请至少添加一个有效的商品');
                return;
            }
            
            // 获取已保存的配送单
            let savedInvoices = JSON.parse(localStorage.getItem('savedInvoices') || '[]');
            
            // 检查是否正在编辑已有订单
            const editingInvoiceId = document.getElementById('companyName').getAttribute('data-editing-invoice-id');
            
            let invoice;
            if (editingInvoiceId) {
                // 编辑已有订单
                const invoiceIndex = savedInvoices.findIndex(inv => inv.id === editingInvoiceId);
                
                if (invoiceIndex !== -1) {
                    const originalInvoice = savedInvoices[invoiceIndex];
                    
                    // 创建新的商品列表，保留原有的分拣数据
                    const updatedItems = items.map(newItem => {
                        // 查找原订单中是否有相同名称的商品
                        const originalItem = originalInvoice.items.find(item => item.name === newItem.name);
                        
                        if (originalItem && originalItem.isLocked) {
                            // 如果原商品已分拣，保留分拣数据
                            return {
                                ...newItem,
                                isLocked: originalItem.isLocked,
                                sortingQuantity: originalItem.sortingQuantity,
                                sortedAt: originalItem.sortedAt
                            };
                        }
                        
                        // 新商品或未分拣的商品，不保留分拣数据
                        return newItem;
                    });
                    
                    // 更新已有订单，保留原订单的分拣相关字段
                    invoice = {
                        ...originalInvoice,
                        userName,
                        date,
                        items: updatedItems,
                        total: document.getElementById('totalAmount').textContent,
                        updatedAt: new Date().toISOString()
                    };
                    
                    savedInvoices[invoiceIndex] = invoice;
                    
                    // 清除编辑标记
                    document.getElementById('companyName').removeAttribute('data-editing-invoice-id');
                    
                    alert('配送单更新成功！已保留原分拣数据。');
                } else {
                    alert('未找到要更新的配送单');
                    return;
                }
            } else {
                // 创建新配送单
                invoice = {
                    id: generateInvoiceId(),
                    userName,
                    date,
                    items,
                    total: document.getElementById('totalAmount').textContent,
                    createdAt: new Date().toISOString()
                };
                
                // 添加新配送单
                savedInvoices.push(invoice);
                
                alert('配送单保存成功！');
            }
            
            // 保存到本地存储
            localStorage.setItem('savedInvoices', JSON.stringify(savedInvoices));
            
            // 同步到其他设备
            if (syncManager) {
                syncManager.sendDataUpdate('invoices', savedInvoices);
            }
            
            // 重置表单
            resetForm();
        }
        
        // 生成配送单ID
        function generateInvoiceId() {
            const date = new Date();
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const random = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
            
            return `${year}${month}${day}${random}`;
        }

        // 局域网同步功能
        let syncManager;

        // 初始化局域网同步
        function initSync() {
            syncManager = new SyncManager();
            syncManager.init();
        }

        // 同步管理器类
        class SyncManager {
            constructor() {
                this.broadcastChannel = null;
                this.deviceId = null;
                this.connectedDevices = new Set();
                this.syncStatus = 'disconnected';
                this.isSyncing = false;
                this.offlineQueue = JSON.parse(localStorage.getItem('syncOfflineQueue') || '[]');
                this.lastSyncTime = localStorage.getItem('lastSyncTime') || null;
                
                // 监听存储变化，同步其他标签页的更改
                window.addEventListener('storage', this.handleStorageChange.bind(this));
            }

            init() {
                try {
                    // 生成设备ID
                    this.deviceId = this.generateDeviceId();
                    document.getElementById('currentDeviceId').textContent = this.deviceId;
                    
                    // 创建Broadcast Channel
                    this.broadcastChannel = new BroadcastChannel('delivery-invoice-sync');
                    
                    // 监听消息
                    this.broadcastChannel.onmessage = this.handleMessage.bind(this);
                    
                    // 监听错误
                    this.broadcastChannel.onerror = this.handleError.bind(this);
                    
                    // 监听关闭
                    this.broadcastChannel.onclose = this.handleClose.bind(this);
                    
                    // 发送设备上线消息
                    this.sendDeviceOnline();
                    
                    // 设置定期同步
                    this.setupPeriodicSync();
                    
                    // 处理离线队列
                    this.processOfflineQueue();
                    
                    // 更新状态
                    this.updateSyncStatus('connected');
                    
                    console.log('同步管理器初始化成功');
                } catch (error) {
                    console.error('同步管理器初始化失败:', error);
                    this.updateSyncStatus('disconnected');
                    // 降级到localStorage同步
                    this.setupLocalStorageSync();
                }
            }

            generateDeviceId() {
                let deviceId = localStorage.getItem('deviceId');
                if (!deviceId) {
                    deviceId = 'device_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                    localStorage.setItem('deviceId', deviceId);
                }
                return deviceId;
            }

            sendDeviceOnline() {
                this.sendMessage({
                    type: 'DEVICE_ONLINE',
                    deviceId: this.deviceId,
                    timestamp: new Date().toISOString()
                });
            }

            sendDeviceOffline() {
                this.sendMessage({
                    type: 'DEVICE_OFFLINE',
                    deviceId: this.deviceId,
                    timestamp: new Date().toISOString()
                });
            }

            sendDataUpdate(dataType, data, operation = 'update') {
                this.sendMessage({
                    type: 'DATA_UPDATE',
                    deviceId: this.deviceId,
                    timestamp: new Date().toISOString(),
                    dataType: dataType,
                    operation: operation,
                    data: data
                });
            }

            sendMessage(message) {
                try {
                    if (this.broadcastChannel && this.broadcastChannel.readyState === 'open') {
                        this.broadcastChannel.postMessage(message);
                    } else {
                        // 添加到离线队列
                        this.addToOfflineQueue(message);
                    }
                } catch (error) {
                    console.error('发送消息失败:', error);
                    this.addToOfflineQueue(message);
                }
            }

            handleMessage(event) {
                const message = event.data;
                
                if (!message || !message.type) return;
                
                console.log('收到消息:', message);
                
                switch (message.type) {
                    case 'DEVICE_ONLINE':
                        this.handleDeviceOnline(message);
                        break;
                    case 'DEVICE_OFFLINE':
                        this.handleDeviceOffline(message);
                        break;
                    case 'DATA_UPDATE':
                        this.handleDataUpdate(message);
                        break;
                    case 'PING':
                        this.handlePing(message);
                        break;
                    case 'PONG':
                        this.handlePong(message);
                        break;
                }
            }

            handleDeviceOnline(message) {
                if (message.deviceId !== this.deviceId) {
                    this.connectedDevices.add(message.deviceId);
                    this.updateDevicesList();
                    
                    // 发送PONG响应
                    this.sendMessage({
                        type: 'PONG',
                        deviceId: this.deviceId,
                        timestamp: new Date().toISOString(),
                        targetDeviceId: message.deviceId
                    });
                }
            }

            handleDeviceOffline(message) {
                if (message.deviceId !== this.deviceId) {
                    this.connectedDevices.delete(message.deviceId);
                    this.updateDevicesList();
                }
            }

            handleDataUpdate(message) {
                if (message.deviceId === this.deviceId) return; // 忽略自己发送的消息
                
                this.isSyncing = true;
                this.updateSyncStatus('syncing');
                
                try {
                    switch (message.dataType) {
                        case 'invoices':
                            this.syncInvoices(message.data, message.operation);
                            break;
                        case 'products':
                            this.syncProducts(message.data, message.operation);
                            break;
                        case 'users':
                            this.syncUsers(message.data, message.operation);
                            break;
                    }
                    
                    this.lastSyncTime = new Date().toISOString();
                    localStorage.setItem('lastSyncTime', this.lastSyncTime);
                    
                } catch (error) {
                    console.error('数据同步失败:', error);
                } finally {
                    setTimeout(() => {
                        this.isSyncing = false;
                        this.updateSyncStatus('connected');
                    }, 1000);
                }
            }

            handlePing(message) {
                if (message.deviceId !== this.deviceId) {
                    this.sendMessage({
                        type: 'PONG',
                        deviceId: this.deviceId,
                        timestamp: new Date().toISOString(),
                        targetDeviceId: message.deviceId
                    });
                }
            }

            handlePong(message) {
                if (message.targetDeviceId === this.deviceId) {
                    this.connectedDevices.add(message.deviceId);
                    this.updateDevicesList();
                }
            }

            handleError(error) {
                console.error('Broadcast Channel错误:', error);
                this.updateSyncStatus('disconnected');
            }

            handleClose() {
                console.log('Broadcast Channel关闭');
                this.updateSyncStatus('disconnected');
            }

            handleStorageChange(event) {
                // 只处理特定的存储键
                const syncKeys = ['savedInvoices', 'presetProducts', 'savedUsers'];
                if (syncKeys.includes(event.key) && event.newValue) {
                    // 通知其他设备数据已更改
                    switch (event.key) {
                        case 'savedInvoices':
                            this.sendDataUpdate('invoices', JSON.parse(event.newValue));
                            break;
                        case 'presetProducts':
                            this.sendDataUpdate('products', JSON.parse(event.newValue));
                            break;
                        case 'savedUsers':
                            this.sendDataUpdate('users', JSON.parse(event.newValue));
                            break;
                    }
                }
            }

            syncInvoices(data, operation) {
                const currentInvoices = JSON.parse(localStorage.getItem('savedInvoices') || '[]');
                
                if (operation === 'replace') {
                    // 完全替换
                    localStorage.setItem('savedInvoices', JSON.stringify(data));
                } else {
                    // 合并数据，基于时间戳解决冲突
                    const mergedInvoices = this.mergeInvoices(currentInvoices, data);
                    localStorage.setItem('savedInvoices', JSON.stringify(mergedInvoices));
                }
                
                // 显示同步提示
                this.showSyncNotification('配送单数据已同步');
            }

            syncProducts(data, operation) {
                const currentProducts = JSON.parse(localStorage.getItem('presetProducts') || '[]');
                
                if (operation === 'replace') {
                    localStorage.setItem('presetProducts', JSON.stringify(data));
                } else {
                    // 合并商品列表，去重
                    const mergedProducts = [...new Set([...currentProducts, ...data])];
                    localStorage.setItem('presetProducts', JSON.stringify(mergedProducts));
                }
                
                this.showSyncNotification('商品数据已同步');
            }

            syncUsers(data, operation) {
                const currentUsers = JSON.parse(localStorage.getItem('savedUsers') || '[]');
                
                if (operation === 'replace') {
                    localStorage.setItem('savedUsers', JSON.stringify(data));
                } else {
                    // 合并用户列表，去重
                    const mergedUsers = [...new Set([...currentUsers, ...data])];
                    localStorage.setItem('savedUsers', JSON.stringify(mergedUsers));
                }
                
                this.showSyncNotification('用户数据已同步');
            }

            mergeInvoices(localInvoices, remoteInvoices) {
                const invoiceMap = new Map();
                
                // 添加本地发票
                localInvoices.forEach(invoice => {
                    invoiceMap.set(invoice.id, invoice);
                });
                
                // 合并远程发票，基于时间戳解决冲突
                remoteInvoices.forEach(remoteInvoice => {
                    const localInvoice = invoiceMap.get(remoteInvoice.id);
                    
                    if (!localInvoice) {
                        // 本地没有，直接添加
                        invoiceMap.set(remoteInvoice.id, remoteInvoice);
                    } else {
                        // 比较时间戳
                        const localTime = new Date(localInvoice.updatedAt || localInvoice.createdAt);
                        const remoteTime = new Date(remoteInvoice.updatedAt || remoteInvoice.createdAt);
                        
                        if (remoteTime > localTime) {
                            // 远程更新，使用远程数据
                            invoiceMap.set(remoteInvoice.id, remoteInvoice);
                        }
                    }
                });
                
                return Array.from(invoiceMap.values());
            }

            addToOfflineQueue(message) {
                this.offlineQueue.push({
                    message: message,
                    timestamp: new Date().toISOString()
                });
                localStorage.setItem('syncOfflineQueue', JSON.stringify(this.offlineQueue));
            }

            processOfflineQueue() {
                if (this.offlineQueue.length > 0 && this.broadcastChannel && this.broadcastChannel.readyState === 'open') {
                    console.log('处理离线队列，共', this.offlineQueue.length, '条消息');
                    
                    this.offlineQueue.forEach(({ message }) => {
                        this.sendMessage(message);
                    });
                    
                    this.offlineQueue = [];
                    localStorage.setItem('syncOfflineQueue', JSON.stringify(this.offlineQueue));
                }
            }

            setupPeriodicSync() {
                // 每30秒发送一次PING消息
                setInterval(() => {
                    this.sendMessage({
                        type: 'PING',
                        deviceId: this.deviceId,
                        timestamp: new Date().toISOString()
                    });
                }, 30000);
                
                // 每2分钟清理一次不活跃的设备
                setInterval(() => {
                    this.cleanupInactiveDevices();
                }, 120000);
            }

            setupLocalStorageSync() {
                console.log('降级到localStorage同步模式');
                
                // 定期检查localStorage变化
                setInterval(() => {
                    this.checkLocalStorageChanges();
                }, 5000);
            }

            checkLocalStorageChanges() {
                // 这个方法可以检测其他同源标签页的更改
                // 由于已经有storage事件监听，这里主要用于检测其他设备的更改
                // 可以通过比较时间戳来判断是否有新数据
            }

            cleanupInactiveDevices() {
                // 清理长时间没有响应的设备
                // 这里简化处理，实际应用中可以添加更复杂的逻辑
            }

            updateSyncStatus(status) {
                this.syncStatus = status;
                const indicator = document.getElementById('syncIndicator');
                const statusText = document.getElementById('syncStatus');
                const deviceCount = document.getElementById('connectedDevices');
                
                indicator.className = `sync-indicator ${status} no-print`;
                
                switch (status) {
                    case 'connected':
                        statusText.textContent = '已连接';
                        deviceCount.classList.remove('hidden');
                        deviceCount.textContent = this.connectedDevices.size;
                        break;
                    case 'disconnected':
                        statusText.textContent = '未连接';
                        deviceCount.classList.add('hidden');
                        break;
                    case 'syncing':
                        statusText.textContent = '同步中...';
                        break;
                }
            }

            updateDevicesList() {
                const devicesList = document.getElementById('devicesList');
                const devicesCount = document.getElementById('devicesCount');
                
                devicesCount.textContent = this.connectedDevices.size;
                
                if (this.connectedDevices.size === 0) {
                    devicesList.innerHTML = '<div class="text-center py-4 text-gray-500">暂无连接的设备</div>';
                    return;
                }
                
                devicesList.innerHTML = '';
                this.connectedDevices.forEach(deviceId => {
                    const deviceItem = document.createElement('div');
                    deviceItem.className = 'device-item active';
                    deviceItem.innerHTML = `
                        <span class="truncate" title="${deviceId}">${deviceId}</span>
                        <span class="text-green-500"><i class="fa fa-circle text-xs"></i></span>
                    `;
                    devicesList.appendChild(deviceItem);
                });
            }

            showSyncNotification(message) {
                const toast = document.createElement('div');
                toast.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 bg-success text-white px-4 py-2 rounded shadow-lg z-50 transition-all duration-300';
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => {
                        document.body.removeChild(toast);
                    }, 300);
                }, 2000);
            }

            // 测试同步功能
            testSync() {
                this.sendDataUpdate('invoices', JSON.parse(localStorage.getItem('savedInvoices') || '[]'));
                this.showSyncNotification('测试同步消息已发送');
            }

            // 清理资源
            cleanup() {
                if (this.broadcastChannel) {
                    this.sendDeviceOffline();
                    this.broadcastChannel.close();
                }
            }
        }

        function formatDateString(dateString) {
            const date = new Date(dateString);
            return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
        }
        
        // 格式化日期时间字符串
        function formatDateTimeString(dateTimeString) {
            const date = new Date(dateTimeString);
            return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}:${String(date.getSeconds()).padStart(2, '0')}`;
        }

        // 分拣系统事件处理函数
        function addSortingEventListeners() {
            // 为所有分拣数量输入框添加事件监听
            document.querySelectorAll('.sorting-quantity').forEach(input => {
                // 阻止上下箭头键改变数值
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                        e.preventDefault();
                    }
                });
                
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        lockSortingQuantity(this);
                    }
                });
                

            });

            // 为所有打印按钮添加事件监听
            console.log('绑定打印按钮事件监听');

            printButtons.forEach((button, index) => {
                console.log('绑定按钮索引:', index, '用户:', button.dataset.user, '商品:', button.dataset.product);
                button.addEventListener('click', function(e) {
                    e.stopPropagation();
                    e.preventDefault();
                    const userName = this.dataset.user;
                    const productName = this.dataset.product;
                    console.log('打印按钮点击:', userName, productName);
                    printSortingLabel(userName, productName);
                });
                // 立即测试点击
                if (index === 0) {
                    console.log('测试第一个打印按钮');
                }
            });
            
            // 为所有撤销按钮添加事件监听
            document.querySelectorAll('.undo-sorting').forEach(button => {
                button.addEventListener('click', function() {
                    const userName = this.dataset.user;
                    const productName = this.dataset.product;
                    // 显示确认提示
                    if (confirm(`确定要撤销"${userName}"的"${productName}"分拣记录吗？`)) {
                        undoSorting(userName, productName);
                    }
                });
            });
        }

        function undoSorting(userName, productName) {
            // 从localStorage获取保存的发票数据
            const savedInvoices = JSON.parse(localStorage.getItem('savedInvoices') || '[]');
            
            // 查找并重置对应的商品分拣状态
            savedInvoices.forEach(invoice => {
                if (invoice.userName === userName) {
                    invoice.items.forEach(item => {
                        if (item.name === productName) {
                            item.sortingQuantity = '';
                            item.isLocked = false;
                        }
                    });
                }
            });
            
            // 保存更新后的数据
            localStorage.setItem('savedInvoices', JSON.stringify(savedInvoices));
            
            // 更新UI状态
            const inputElement = document.querySelector(`.sorting-quantity[data-user="${userName}"][data-product="${productName}"]`);
            if (inputElement) {
                inputElement.disabled = false;
                inputElement.classList.remove('bg-gray-200');
                inputElement.value = '';
            }
            
            // 更新分拣状态显示
            const statusElement = inputElement.closest('div').querySelector('.sorting-status');
            if (statusElement) {
                statusElement.textContent = '未分拣';
                statusElement.classList.remove('text-green-600');
                statusElement.classList.add('text-red-600');
            }
            
            // 更新撤销按钮状态
            const undoButton = document.querySelector(`.undo-sorting[data-user="${userName}"][data-product="${productName}"]`);
            if (undoButton) {
                undoButton.disabled = true;
            }
        }

        function lockSortingQuantity(input) {
            const userName = input.dataset.user;
            const productName = input.dataset.product;
            const quantity = input.value.trim();
            
            if (quantity === '' || isNaN(quantity) || parseInt(quantity) < 0) {
                alert('请输入有效的分拣数量');
                input.value = '';
                return;
            }

            // 更新本地存储中的数据
            const savedInvoices = JSON.parse(localStorage.getItem('savedInvoices') || '[]');
            let hasUpdated = false;
            
            // 遍历所有发票，更新所有匹配的商品
            savedInvoices.forEach(invoice => {
                if (invoice.userName === userName) {
                    invoice.items.forEach(item => {
                        if (item.name === productName) {
                            item.sortingQuantity = parseFloat(quantity);
                            item.isLocked = true;
                            hasUpdated = true;
                            console.log('已更新发票ID:', invoice.id, '中的商品:', productName);
                        }
                    });
                }
            });
            
            if (hasUpdated) {
                localStorage.setItem('savedInvoices', JSON.stringify(savedInvoices));
                console.log('已保存更新后的发票数据');
            } else {
                console.warn('未找到需要更新的商品:', userName, '-', productName);
            }

            // 实时更新UI状态
            input.disabled = true;
            input.classList.add('bg-gray-200');
            
            // 更新分拣状态显示

            // 页面卸载时清理资源
            window.addEventListener('beforeunload', function() {
                if (syncManager) {
                    syncManager.cleanup();
                }
            });
        </script>
